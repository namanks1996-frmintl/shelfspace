<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Nerds - Shared Element Transition</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            'montagu': ['"Montagu Slab"', 'serif'],
            'poppins': ['Poppins', 'sans-serif'],
          },
          colors: {
            zinc: {
              950: '#09090b',
            }
          }
        }
      }
    }
  </script>
  <link
    href="https://fonts.googleapis.com/css2?family=Montagu+Slab:wght@300;400;500;600;700&family=Poppins:wght@100;200;300;400;500;600;700&display=swap"
    rel="stylesheet">
  <style>
    body {
      background-color: #09090b;
      color: white;
      margin: 0;
      overflow-x: hidden;
    }

    .perspective-1000 {
      perspective: 1000px;
    }

    /* Custom scrollbar for better aesthetics */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: #18181b;
    }

    ::-webkit-scrollbar-thumb {
      background: #3f3f46;
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #52525b;
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
